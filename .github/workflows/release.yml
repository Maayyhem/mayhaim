# Build + publish MayhAim to GitHub Releases.
#
# Trigger: push of a tag matching v*.*.* (e.g. v2.0.3).
# Flow:
#   1. Validate that package.json "version" matches the tag.
#   2. Install deps, build icons, run electron-builder --win --publish always.
#   3. electron-builder uploads the installer, portable .exe, blockmap, and
#      latest.yml to a GitHub Release named after the tag, using the built-in
#      GITHUB_TOKEN (no secret setup required).
#
# Manual bump + release flow (from a clean working tree on main):
#   npm version patch          # bumps package.json + creates tag v2.0.3
#   git push origin main --tags
#
# Or: edit package.json by hand, commit, then:
#   git tag v2.0.3 && git push origin main --tags

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create releases + upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag=$TAG  package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Build + publish (electron-builder)
        # --publish always: creates/updates the GitHub release for the tag and
        # uploads all artifacts (setup .exe, portable .exe, blockmap, latest.yml).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Upload artifacts (backup)
        # Keep a copy on the workflow run for 14 days in case the release upload
        # partially failed — easier to retry from there than rebuilding.
        uses: actions/upload-artifact@v4
        with:
          name: mayhaim-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          retention-days: 14
          if-no-files-found: warn
