<!DOCTYPE html>
<html lang="fr" data-theme="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff4655">
  <meta name="app-version" content="2.7.0">
  <title>Profil — MayhAim</title>
  <link rel="icon" type="image/png" href="build/icon.png">
  <link rel="icon" type="image/x-icon" href="build/icon.ico">
  <link rel="stylesheet" href="style.css">
  <script>
    // Applique le thème choisi dans l'app (localStorage visc_settings.theme)
    try {
      var _s = JSON.parse(localStorage.getItem('visc_settings') || '{}');
      if (_s && _s.theme) document.documentElement.dataset.theme = _s.theme;
    } catch (e) {}
  </script>
  <script src="ui.js"></script>
  <script src="chart.umd.min.js"></script>
  <style>
    /* style.css (partagé avec l'app) pose body{overflow:hidden;height:100vh;
       user-select:none} — correct pour le hub (scroll interne .ch-scroll) mais
       ça bloquait le scroll et la sélection de cette page publique. On rétablit
       un flux de page normal. NB: la variable de texte est --txt (pas --text). */
    body {
      background: var(--bg); color: var(--txt); font-family: var(--font);
      min-height: 100vh; height: auto; width: auto;
      overflow-y: auto; overflow-x: hidden;
      user-select: text;
    }
    .pub-wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }

    /* TOPBAR */
    .pub-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .pub-logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
    .pub-logo span { color: var(--accent); }
    .pub-back-btn { background: var(--card); border: 1px solid var(--border); color: var(--txt); border-radius: 8px; padding: 7px 16px; cursor: pointer; font-size: 0.82rem; font-family: var(--font); text-decoration: none; display: inline-flex; align-items: center; }
    .pub-back-btn:hover { background: var(--card-h); border-color: var(--border-2); }

    /* HEADER */
    .pub-header { display: flex; align-items: center; gap: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
    .pub-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--accent-bg); border: 1px solid var(--border-2); color: var(--txt); font-size: 2rem; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
    .pub-info { flex: 1; min-width: 0; }
    .pub-username { font-size: 1.5rem; font-weight: 700; letter-spacing: var(--ls-tight); line-height: 1.1; }
    .pub-rank-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-brd); border-radius: var(--r-xs); padding: 2px 8px; font-family: var(--font-mono); font-size: var(--fs-xs); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-top: 5px; }
    .pub-objective { color: var(--dim); font-size: 0.83rem; margin-top: 6px; }
    .pub-global-rank { text-align: right; flex-shrink: 0; }
    .pub-global-rank .rank-num { font-family: var(--font-mono); font-size: 2rem; font-weight: 600; color: var(--txt); line-height: 1; font-variant-numeric: tabular-nums; }
    .pub-global-rank .rank-lbl { font-size: var(--fs-xs); color: var(--faint); text-transform: uppercase; letter-spacing: var(--ls-wide); font-weight: 600; }
    .pub-member-since { font-size: 0.74rem; color: var(--faint); margin-top: 4px; }

    /* STATS ROW — stat-chips : valeur mono blanche, label micro --faint */
    .pub-stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
    .pub-stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px 10px; text-align: center; box-shadow: var(--edge); }
    .pub-stat-val { display: block; font-family: var(--font-mono); font-size: 1.35rem; font-weight: 500; color: var(--txt); font-variant-numeric: tabular-nums; }
    .pub-stat-val.accent { color: var(--accent); } /* SEULE stat accent : le record (PB) */
    .pub-stat-lbl { display: block; font-size: var(--fs-xs); color: var(--faint); font-weight: 600; margin-top: 3px; text-transform: uppercase; letter-spacing: var(--ls-wide); }

    /* SECTIONS */
    .pub-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-md); padding: 20px; margin-bottom: 16px; box-shadow: var(--edge); }
    .pub-section-title { display: flex; align-items: center; gap: 8px; font-size: var(--fs-xs); font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: var(--ls-wide); margin-bottom: 14px; }
    .pub-section-title::before { content: '//'; color: var(--dim); font-family: var(--font-mono); font-weight: 600; }
    .pub-section-title svg { width: 14px; height: 14px; color: var(--faint); flex-shrink: 0; }

    /* ACTIVITY CHART */
    .pub-chart-wrap { height: 120px; }

    /* BOTTOM GRID */
    .pub-bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* MODE LIST */
    .pub-mode-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .pub-mode-item:last-child { border-bottom: none; }
    .pub-mode-name { flex: 1; font-size: 0.82rem; font-weight: 600; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pub-mode-score { font-family: var(--font-mono); font-size: 0.88rem; font-weight: 500; color: var(--txt); font-variant-numeric: tabular-nums; }
    .pub-mode-acc { font-size: var(--fs-xs); color: var(--dim); }

    /* RECENT GAMES */
    .pub-game-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
    .pub-game-item:last-child { border-bottom: none; }
    .pub-game-mode { flex: 1; font-weight: 600; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pub-game-score { font-family: var(--font-mono); font-weight: 500; color: var(--txt); font-variant-numeric: tabular-nums; }
    .pub-game-acc { color: var(--dim); font-size: var(--fs-xs); }
    .pub-game-date { color: var(--faint); font-size: var(--fs-xs); }

    /* STREAK BADGE — recette .badge--warn */
    .pub-streak { display: inline-flex; align-items: center; gap: 5px; background: var(--warn-bg); border: 1px solid var(--warn-brd); border-radius: var(--r-xs); padding: 2px 8px; font-family: var(--font-mono); font-size: var(--fs-xs); font-weight: 600; color: var(--warn); margin-top: 5px; }

    /* TRAINING HOURS BADGE — recette .badge--info */
    .pub-hours { display: inline-flex; align-items: center; gap: 5px; background: var(--info-bg); border: 1px solid var(--info-brd); border-radius: var(--r-xs); padding: 2px 8px; font-family: var(--font-mono); font-size: var(--fs-xs); font-weight: 600; color: var(--info); margin-top: 5px; margin-left: 6px; }

    /* PERCENTILE BADGE sur les top modes */
    .pub-mode-badge { display: inline-block; font-family: var(--font-mono); font-size: var(--fs-xs); font-weight: 600; padding: 1px 7px; border-radius: var(--r-xs); margin-right: 6px; vertical-align: middle; letter-spacing: 0.04em; }
    .pub-mode-badge.top-10 { background: var(--warn-bg); border: 1px solid var(--warn-brd); color: var(--warn); }
    .pub-mode-badge.top-25 { background: var(--accent-bg); border: 1px solid var(--accent-brd); color: var(--accent); }
    .pub-mode-badge.top-50 { background: var(--hover-veil); border: 1px solid var(--border-2); color: var(--dim); }

    /* EMPTY / ERROR / LOADING */
    .pub-loading { text-align: center; color: var(--dim); padding: 60px 0; font-size: 0.9rem; }
    .pub-error { text-align: center; padding: 60px 20px; }
    .pub-error-title { font-family: var(--font-mono); font-size: 2rem; font-weight: 600; color: var(--txt); margin-bottom: 8px; }
    .pub-error-msg { color: var(--dim); font-size: 0.9rem; }

    /* SHARE */
    .pub-share-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .pub-share-btn { background: none; border: 1px solid var(--border); color: var(--txt); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 0.8rem; font-family: var(--font); display: flex; align-items: center; gap: 6px; }
    .pub-share-btn:hover { background: var(--card-h); border-color: var(--border-2); }
    .pub-share-copied { font-size: 0.75rem; color: var(--success); display: none; }

    /* FOOTER */
    .pub-footer { text-align: center; color: var(--dim); font-size: 0.75rem; margin-top: 40px; }
    .pub-footer a { color: var(--accent); text-decoration: none; }

    @media(max-width: 600px) {
      .pub-stats-row { grid-template-columns: repeat(3, 1fr); }
      .pub-bottom-grid { grid-template-columns: 1fr; }
      .pub-header { flex-wrap: wrap; }
      /* Touch targets ≥ 44px (page souvent ouverte sur téléphone) */
      .pub-back-btn, .pub-share-btn { min-height: 44px; }
    }
    @media(max-width: 480px) {
      .pub-wrap { padding: 20px 12px 40px; }
      .pub-topbar { margin-bottom: 20px; }
      .pub-header { padding: 16px; gap: 14px; }
      .pub-username { font-size: 1.25rem; }
      .pub-avatar { width: 52px; height: 52px; font-size: 1.6rem; }
      .pub-global-rank { text-align: left; width: 100%; }
      .pub-section { padding: 14px; }
      .pub-stats-row { gap: 8px; }
      .pub-stat { padding: 12px 6px; }
      .pub-stat-val { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

<div class="pub-wrap">

  <!-- Topbar -->
  <div class="pub-topbar">
    <div class="pub-logo">Mayh<span>Aim</span></div>
    <a href="/" class="pub-back-btn">← Accueil</a>
  </div>

  <!-- Content -->
  <div id="pub-content">
    <div class="pub-loading" id="pub-loading">Chargement du profil…</div>
  </div>

</div>

<script>
const SCENARIO_LABELS = {
  whisphereraw:'WhisphereRawControl', whisphere:'Whisphere', smoothbot:'SmoothBot Goated', leaptrack:'Leaptrack Goated',
  ctrlsphere_aim:'Controlsphere rAim', vt_ctrlsphere:'VT Controlsphere', air_angelic:'Air Angelic 4', cloverraw:'Cloverrawcontrol',
  ctrlsphere_far:'Controlsphere Far', pgti:'PGTI Voltaic Easy', air_celestial:'Air CELESTIAL', whisphere_slow:'Whisphere Slow',
  ground_plaza:'Ground Plaza Sparky', ctrlsphere_ow:'Controlsphere OW', flicker_plaza:'Flicker Plaza rAim',
  polarized_hell:'Polarized Hell', air_pure:'Air Pure', air_voltaic:'Air Voltaic',
  pokeball_frenzy:'Pokeball Frenzy', w1w3ts_reload:'1w3ts Reload', vox_ts2:'voxTargetSwitch 2',
  beants:'BeanTS', floatts:'FloatTS', waldots:'WaldoTS', devts:'devTS', domiswitch:'domiSwitch', tamts:'tamTargetSwitch',
  pasu_reload:'Pasu Reload', vt_bounceshot:'VT Bounceshot', ctrlsphere_clk:'Controlsphere Click',
  popcorn_mv:'Popcorn MV', pasu_angelic:'Pasu Angelic', pasu_perfected:'1w2ts Pasu Perfected',
  pasu_micro:'1w3ts Pasu Perfected Micro', floatheads_t:'Floating Heads Timing', vox_click:'voxTargetClick',
  gridshot:'Gridshot', speedflick:'Speed Flick', crosshair_drill:'Crosshair Drill',
  deadzone_drill:'Deadzone Drill', burst_drill:'Burst Drill', strafe_drill:'Strafe Drill',
  reaction_drill:'Reaction Drill', micro_drill:'Micro Precision'
};

function modeLabel(m) { return SCENARIO_LABELS[m] || m.replace(/_/g,' '); }

function relTime(iso) {
  const d = new Date(iso), now = Date.now(), diff = now - d;
  const s = Math.floor(diff/1000), m = Math.floor(s/60), h = Math.floor(m/60), dy = Math.floor(h/24);
  if (dy > 30) return d.toLocaleDateString('fr-FR');
  if (dy > 0) return 'Il y a ' + dy + 'j';
  if (h > 0) return 'Il y a ' + h + 'h';
  if (m > 0) return 'Il y a ' + m + 'min';
  return 'À l\'instant';
}

function memberSince(iso) {
  const d = new Date(iso);
  return 'Membre depuis ' + d.toLocaleDateString('fr-FR', { year:'numeric', month:'long' });
}

// Convertit un percentile rank (0-99, où higher = better) en badge "top X%".
// On ne montre le badge qu'à partir du top 50% pour ne pas saouler l'UI avec
// des "top 75%" sur des modes peu joués. Retourne string HTML ou ''.
function percentileBadge(p) {
  if (p == null || !isFinite(p)) return '';
  if (p >= 90) return '<span class="pub-mode-badge top-10">TOP 10%</span>';
  if (p >= 75) return '<span class="pub-mode-badge top-25">TOP 25%</span>';
  if (p >= 50) return '<span class="pub-mode-badge top-50">TOP 50%</span>';
  return '';
}

// Formate les secondes d'entraînement en "Xh Ymin" ou "Ymin" pour < 1h
function formatTrainingTime(sec) {
  sec = Number(sec) || 0;
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (h === 0) return m + ' min';
  if (h < 10) return h + 'h ' + m + 'min';
  return h + 'h';
}

function copyShareLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const el = document.getElementById('pub-copied');
    if (el) { el.style.display = 'inline'; setTimeout(() => el.style.display = 'none', 2000); }
  });
}

let _actChart = null;

function render(data) {
  const { user, stats, top_modes, recent_games, activity_30 } = data;
  const initial = user.username.charAt(0).toUpperCase();

  const html = `
    <!-- Header -->
    <div class="pub-header">
      <div class="pub-avatar">${initial}</div>
      <div class="pub-info">
        <div class="pub-username">${user.username}</div>
        ${user.current_rank ? `<div class="pub-rank-badge">${icon('gamepad',12)} ${user.current_rank}</div>` : ''}
        ${user.objective ? `<div class="pub-objective">${user.objective}</div>` : ''}
        ${stats.streak > 0 ? `<div class="pub-streak">${icon('flame',12)} ${stats.streak} jour${stats.streak>1?'s':''} de streak</div>` : ''}
        ${stats.training_seconds > 0 ? `<div class="pub-hours">${icon('training',12)} ${formatTrainingTime(stats.training_seconds)} d'entraînement</div>` : ''}
        <div class="pub-member-since">${memberSince(user.created_at)}</div>
      </div>
      ${stats.rank ? `<div class="pub-global-rank">
        <div class="rank-num">#${stats.rank}</div>
        <div class="rank-lbl">Classement global</div>
      </div>` : ''}
    </div>

    <!-- Share row -->
    <div class="pub-share-row">
      <button class="pub-share-btn" onclick="copyShareLink()">${icon('link',14)} Copier le lien</button>
      <span class="pub-share-copied" id="pub-copied">✓ Copié !</span>
    </div>

    <!-- Stats row -->
    <div class="pub-stats-row" style="margin-top:14px">
      <div class="pub-stat"><span class="pub-stat-val">${stats.total_games.toLocaleString()}</span><span class="pub-stat-lbl">Parties</span></div>
      <div class="pub-stat"><span class="pub-stat-val accent">${Number(stats.best_score).toLocaleString()}</span><span class="pub-stat-lbl">Record</span></div>
      <div class="pub-stat"><span class="pub-stat-val">${Number(stats.avg_score).toLocaleString()}</span><span class="pub-stat-lbl">Score moy.</span></div>
      <div class="pub-stat"><span class="pub-stat-val">${stats.avg_accuracy}%</span><span class="pub-stat-lbl">Précision</span></div>
      <div class="pub-stat"><span class="pub-stat-val">${stats.streak > 0 ? stats.streak : '—'}</span><span class="pub-stat-lbl">Streak</span></div>
    </div>

    <!-- Activity chart -->
    <div class="pub-section">
      <div class="pub-section-title">${icon('trending',14)} Activité — 30 derniers jours</div>
      <div class="pub-chart-wrap"><canvas id="pub-act-chart"></canvas></div>
    </div>

    <!-- Bottom grid -->
    <div class="pub-bottom-grid">
      <div class="pub-section">
        <div class="pub-section-title">${icon('target',14)} Meilleurs modes</div>
        ${top_modes.length === 0 ? '<p style="color:var(--dim);font-size:0.82rem">Aucune donnée</p>' :
          top_modes.map(m => `
            <div class="pub-mode-item">
              <div class="pub-mode-name">${modeLabel(m.mode)}</div>
              <div>
                ${percentileBadge(m.percentile)}
                <span class="pub-mode-score">${Number(m.best_score).toLocaleString()}</span>
                <span class="pub-mode-acc"> · ${m.avg_acc}%</span>
              </div>
            </div>`).join('')}
      </div>
      <div class="pub-section">
        <div class="pub-section-title">${icon('gamepad',14)} Parties récentes</div>
        ${recent_games.length === 0 ? '<p style="color:var(--dim);font-size:0.82rem">Aucune partie</p>' :
          recent_games.map(g => `
            <div class="pub-game-item">
              <div class="pub-game-mode">${modeLabel(g.mode)}</div>
              <span class="pub-game-score">${Number(g.score).toLocaleString()}</span>
              <span class="pub-game-acc">${g.accuracy}%</span>
              <span class="pub-game-date">${relTime(g.played_at)}</span>
            </div>`).join('')}
      </div>
    </div>

    <div class="pub-footer">
      Profil public · <a href="/">MayhAim</a> — Viscose Benchmark Aim Trainer
    </div>
  `;

  document.getElementById('pub-content').innerHTML = html;
  document.title = user.username + ' — MayhAim';

  // Build activity chart
  const days30 = [];
  const today = new Date();
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days30.push(d.toISOString().slice(0,10));
  }
  const actMap = {};
  activity_30.forEach(r => actMap[r.day] = r.games);
  const actData = days30.map(d => actMap[d] || 0);

  if (_actChart) _actChart.destroy();
  const ctx = document.getElementById('pub-act-chart');
  if (ctx) {
    // Palette charts Obsidian Signal — helper local (fallback si ui.js absent)
    const cc = (window.chartColors && window.chartColors()) || {
      accent: '#ff4655', grid: 'rgba(255,255,255,0.06)', text: '#7e8699'
    };
    _actChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: days30.map(d => d.slice(5)),
        datasets: [{ data: actData, backgroundColor: cc.accent + '66', borderColor: cc.accent, borderWidth: 1, borderRadius: 3 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: cc.text, maxTicksLimit: 7, font: { size: 9 } }, grid: { display: false } },
          y: { ticks: { color: cc.text, font: { size: 9 }, stepSize: 1 }, grid: { color: cc.grid }, min: 0 }
        }
      }
    });
  }
}

function showError(msg) {
  document.getElementById('pub-content').innerHTML = `
    <div class="pub-error">
      <div class="pub-error-title">404</div>
      <div class="pub-error-msg">${msg}</div>
      <a href="/" style="display:inline-block;margin-top:20px;color:var(--accent);text-decoration:none;font-weight:700">← Retour à MayhAim</a>
    </div>`;
}

// Load on init
(async function() {
  const params = new URLSearchParams(location.search);
  const username = params.get('u');
  if (!username) { showError('Aucun pseudo spécifié. Utilise ?u=pseudo dans l\'URL.'); return; }

  try {
    const resp = await fetch('/api/coaching?view=public-profile&username=' + encodeURIComponent(username));
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      showError(err.error || 'Profil introuvable');
      return;
    }
    const data = await resp.json();
    render(data);
  } catch(e) {
    showError('Erreur réseau : ' + e.message);
  }
})();
</script>
</body>
</html>
