<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MayhAim</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #1a0f14 0%, #0a0a0f 70%);
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      animation: fadeIn 400ms ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .logo-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,70,85,0.35) 0%, transparent 70%);
      filter: blur(14px);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(0.95); }
      50%      { opacity: 1;   transform: scale(1.05); }
    }
    .logo-wrap img {
      width: 128px;
      height: 128px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 6px 24px rgba(255,70,85,0.45));
    }

    .brand {
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1;
    }
    .brand-red { color: #ff4655; }

    .tagline {
      font-size: 0.78rem;
      color: #8b949e;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .progress {
      width: 180px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress::before {
      content: '';
      position: absolute;
      inset: 0;
      width: 40%;
      background: linear-gradient(90deg, transparent, #ff4655, transparent);
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="icon.png" alt="MayhAim">
  </div>
  <div>
    <div class="brand">MAYH<span class="brand-red">AIM</span></div>
    <div class="tagline" style="margin-top:6px;text-align:center;">Aim Trainer &middot; Coaching Hub</div>
  </div>
  <div class="progress" aria-label="Chargement"></div>
  <div class="version" id="version">v1.0.0</div>
</body>
</html>
