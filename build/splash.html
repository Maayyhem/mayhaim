<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MayhAim</title>
  <style>
    /* Obsidian Signal v3 — tokens en littéraux (fichier autonome, chargé avant l'app) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      color: #eaedf5;
      font-family: 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      animation: fadeIn 400ms cubic-bezier(.16,1,.3,1);
      position: relative;
    }
    /* signature héros : gradient d'accent discret + filet lumineux haut */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(120% 100% at 50% 0%, rgba(255,70,85,0.07), transparent 60%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      pointer-events: none;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .logo-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap img {
      width: 112px;
      height: 112px;
      position: relative;
      z-index: 1;
    }

    .brand {
      font-size: 1.9rem;
      font-weight: 650;
      letter-spacing: -0.015em;
      line-height: 1;
      text-align: center;
    }
    .brand-red { color: #ff4655; }

    .tagline {
      font-size: 0.6875rem; /* 11px — plancher */
      font-weight: 600;
      color: #7e8699;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .progress {
      width: 180px;
      height: 2px;
      background: #23232f;
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }
    .progress::before {
      content: '';
      position: absolute;
      inset: 0;
      width: 40%;
      background: linear-gradient(90deg, transparent, #ff4655, transparent);
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
      .progress::before { animation-duration: 2.4s; }
    }

    .version {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-family: 'Cascadia Mono', 'Consolas', ui-monospace, monospace;
      font-size: 0.6875rem;
      color: #7e8699;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="icon.png" alt="MayhAim">
  </div>
  <div>
    <div class="brand">MAYH<span class="brand-red">AIM</span></div>
    <div class="tagline" style="margin-top:8px;text-align:center;">Aim Trainer &middot; Coaching Hub</div>
  </div>
  <div class="progress" aria-label="Chargement"></div>
  <div class="version" id="version">v2.7.0</div>
</body>
</html>
